server {
    listen 80;
    server_name _;      # Koi bhi hostname accept karo
    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip Compression ───
    # Files compress karke bhejo → bandwidth kam → faster load
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;    # 1KB se chhoti files compress mat karo
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ─── Static Assets — Long Cache ───
    # JS, CSS, images → 1 year cache
    # Filename mein hash hai (vite karta hai)
    # File change → hash change → naya URL → cache miss → fresh file
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── React Router — SPA Fallback ───
    # Problem: User /cart pe directly jaaye
    # → Nginx /cart file dhundhe → nahi mili → 404
    # Solution: Sab kuch index.html pe send karo
    # → React Router handle karega routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        # index.html cache mat karo
        # Naya deploy → user purana index.html na dekhe
    }

    # ─── Health Check ───
    # Docker aur load balancer check karte hain
    # Container alive hai ya nahi
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}